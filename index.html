
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1X2 Betting Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; padding: 20px; color: #fff; }
        .card { max-width: 500px; margin: auto; background: #16213e; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #0f3460; }
        .logo-container { text-align: center; margin-bottom: 10px; }
        .logo-container img { width: 80px; height: auto; }
        h2 { text-align: center; color: #e94560; margin-top: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #95a5a6; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1px solid #0f3460; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #0f3460; color: white; transition: 0.3s; }
        input:focus { border-color: #e94560; outline: none; }
        .score-row { display: flex; gap: 10px; align-items: center; justify-content: center; background: #1a1a2e; padding: 15px; border-radius: 10px; border: 1px solid #0f3460; }
        .score-box { flex: 1; text-align: center; }
        .score-box input { text-align: center; font-size: 22px; font-weight: bold; color: #e94560; }
        .vs-label { font-weight: bold; font-size: 18px; color: #fff; }
        button { width: 100%; padding: 15px; background: #e94560; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #c62842; transform: translateY(-2px); }
        #resultArea { margin-top: 25px; padding: 20px; border-radius: 10px; display: none; text-align: center; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .status-text { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
        .nominal-text { font-size: 16px; font-family: 'Courier New', Courier, monospace; margin-bottom: 5px; }
        .total-result-text { font-size: 18px; font-weight: bold; border-top: 1px dashed rgba(255,255,255,0.3); margin-top: 10px; padding-top: 10px; color: #fff; }
        .win { background: #27ae60; color: white; }
        .lose { background: #c0392b; color: white; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="https://hs-staging.dev/assets/img/logoicon/logo.webp" alt="Logo">
    </div>
    <h2>1X2 Calculator</h2>
    
    <div class="form-group">
        <label>Nilai Bettingan (IDR)</label>
        <input type="text" id="betDisplay" placeholder="Contoh: 10,000" onkeyup="formatBet(this)">
        <input type="hidden" id="betAmount">
    </div>

    <div class="form-group">
        <label>Odd (Desimal)</label>
        <input type="number" step="0.01" id="oddValue" placeholder="Contoh: 2.15">
    </div>

    <div class="form-group">
        <label>Pilihan Prediksi</label>
        <select id="prediction">
            <option value="1">1 (Home Menang)</option>
            <option value="X">X (Draw/Seri)</option>
            <option value="2">2 (Away Menang)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Hasil Skor Akhir</label>
        <div class="score-row">
            <div class="score-box">
                <small>HOME</small>
                <input type="number" id="scoreHome" value="0" min="0">
            </div>
            <div class="vs-label">VS</div>
            <div class="score-box">
                <small>AWAY</small>
                <input type="number" id="scoreAway" value="0" min="0">
            </div>
        </div>
    </div>

    <button onclick="calculate1X2()">PROSES PERHITUNGAN</button>

    <div id="resultArea">
        <div class="status-text" id="statusLabel"></div>
        <div class="nominal-text" id="profitLabel"></div>
        <div class="total-result-text" id="totalResultLabel"></div>
    </div>
</div>

<script>
    function formatBet(input) {
        let val = input.value.replace(/[^0-9]/g, '');
        document.getElementById('betAmount').value = val;
        if (val) {
            input.value = Number(val).toLocaleString('en-US');
        }
    }

    function calculate1X2() {
        const bet = parseFloat(document.getElementById('betAmount').value) || 0;
        const odd = parseFloat(document.getElementById('oddValue').value) || 0;
        const prediction = document.getElementById('prediction').value;
        const sHome = parseInt(document.getElementById('scoreHome').value) || 0;
        const sAway = parseInt(document.getElementById('scoreAway').value) || 0;

        if (bet <= 0 || odd <= 0) return alert("Silahkan isi nominal betting dan Odd!");

        let matchResult = "";
        if (sHome > sAway) matchResult = "1";
        else if (sHome < sAway) matchResult = "2";
        else matchResult = "X";

        const isWin = (prediction === matchResult);
        
        // Perhitungan:
        // Profit = (Modal * Odd) - Modal
        // Total = Profit + Modal
        let profit = isWin ? (bet * odd) - bet : -bet;
        let totalCalculation = isWin ? (profit + bet) : 0;

        const resArea = document.getElementById('resultArea');
        resArea.style.display = "block";
        resArea.className = isWin ? "win" : "lose";
        
        document.getElementById('statusLabel').innerText = isWin ? "MENANG FULL" : "KALAH FULL";
        
        let formatter = new Intl.NumberFormat('id-ID', { 
            style: 'currency', 
            currency: 'IDR', 
            minimumFractionDigits: 0 
        });
        
        document.getElementById('profitLabel').innerText = (isWin ? "Profit: " : "Rugi: ") + formatter.format(Math.abs(profit));
        document.getElementById('totalResultLabel').innerText = "Profit + Nilai Bettingan: " + formatter.format(totalCalculation);
    }
</script>

</body>
</html>
